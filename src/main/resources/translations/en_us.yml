gui-blocked-worlds-added: "<gray>[<aqua>FluxHomes</aqua>]</gray> <green>Added <white>{world}</white> to the blocked worlds list."
gui-blocked-worlds-removed: "<gray>[<aqua>FluxHomes</aqua>]</gray> <green>Removed <white>{world}</white> from the blocked worlds list."
gui-blocked-worlds-already-added: "<gray>[<aqua>FluxHomes</aqua>]</gray> <red><white>{world}</white> is already in the blocked worlds list."
gui-blocked-worlds-not-found: "<gray>[<aqua>FluxHomes</aqua>]</gray> <red><white>{world}</white> is not in the blocked worlds list."

no-permission: "<gray>[<aqua>FluxHomes</aqua>]</gray> <red>You don't have permission to do that.</red>"
player-only: "<gray>[<aqua>FluxHomes</aqua>]</gray> <red>This command can only be used by players.</red>"
player-not-found: "<gray>[<aqua>FluxHomes</aqua>]</gray> <red>Player <white>{player}</white> not found.</red>"